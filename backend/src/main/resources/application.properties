# Base de datos
# En local usa los valores por defecto; en Docker/Railway los sobreescribe la env var.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cookshare_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:abc123.}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Servidor
server.port=8080

# Subida de archivos (vídeos para Gemini pueden pesar hasta 50 MB)
# El default de Spring son 1MB / 10MB y eso causa ERR_CONNECTION_RESET
# antes de que el controlador llegue siquiera a procesar el vídeo.
spring.servlet.multipart.max-file-size=60MB
spring.servlet.multipart.max-request-size=60MB
server.tomcat.max-http-form-post-size=60MB
server.tomcat.max-swallow-size=60MB

# Logs
logging.level.org.springframework.security=DEBUG

# JWT
jwt.secret=${JWT_SECRET:c29va2NoYXJlU2VjcmV0S2V5UGFyYUxhQXBsaWNhY2lvbkNvb2tTaGFyZTIwMjU=}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.security.user.name=admin
spring.security.user.password=admin

# Google Gemini — la clave viene de variable de entorno (ver .env.example)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta
# Modelos disponibles en v1beta (mayo 2026):
#   - gemini-2.5-flash       (recomendado, soporta vídeo, mejor cuota gratis)
#   - gemini-2.0-flash       (estable, soporta vídeo, cuota baja: 10 RPM)
#   - gemini-2.5-pro         (más potente pero más caro y más restrictivo)
# NO usar gemini-1.5-* (ya no están en v1beta)
gemini.model=gemini-2.5-flash