version: '3.8'

services:

  # ── Base de datos MySQL ──────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: cookshare_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-abc123.}
      MYSQL_DATABASE: cookshare_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "--password=${MYSQL_ROOT_PASSWORD:-abc123.}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend Spring Boot ──────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: cookshare_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/cookshare_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-abc123.}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend Flutter web (nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./app/app
      dockerfile: Dockerfile
      args:
        API_URL: /api
    container_name: cookshare_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
